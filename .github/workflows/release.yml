name: release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - uses: actions/setup-node@v4
        with: {node-version: '22', registry-url: 'https://registry.npmjs.org'}
      - run: python -m pip install build
      - run: python -m build
      - run: python tools/build_release_assets.py
      - uses: actions/upload-artifact@v4
        with: {name: distributions, path: dist/}
  github-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: {name: distributions, path: dist}
      - uses: softprops/action-gh-release@v2
        with: {files: 'dist/*', generate_release_notes: true}
  pypi:
    needs: build
    environment: pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: {name: distributions, path: dist}
      - run: rm -f dist/*.zip dist/*.sha256 dist/SHA256SUMS dist/*.rb dist/*.tgz
      - uses: pypa/gh-action-pypi-publish@release/v1
  npm:
    needs: build
    environment: npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: {name: distributions, path: dist}
      - uses: actions/setup-node@v4
        with: {node-version: '22', registry-url: 'https://registry.npmjs.org'}
      - run: npm publish dist/media2md-cli-*.tgz --access public --provenance
        env: {NODE_AUTH_TOKEN: '${{ secrets.NPM_TOKEN }}'}
  homebrew-tap:
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: {name: distributions, path: dist}
      - uses: actions/checkout@v4
        with:
          repository: danielcanfly/homebrew-tap
          token: '${{ secrets.HOMEBREW_TAP_TOKEN }}'
          path: tap
      - run: |
          mkdir -p tap/Formula
          cp dist/media2md.rb tap/Formula/media2md.rb
          cd tap
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add Formula/media2md.rb
          git diff --cached --quiet || git commit -m "media2md $GITHUB_REF_NAME"
          git push
