name: security
on:
  schedule: [{cron: '17 3 * * 1'}]
  workflow_dispatch:
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: {python-version: '3.12'}
      - run: python -m pip install '.[dev]' pip-audit
      - run: pip-audit
      - run: python -m compileall -q src
